<script>
  const firebaseConfig = {
  apiKey: "AIzaSyB-7PjG5gfg1f4FyKSKMeKsMIjiRUAPsx0",
  authDomain: "mini-project-c7982.firebaseapp.com",
  projectId: "mini-project-c7982"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const provider = new firebase.auth.GoogleAuthProvider();

async function handleLogin(e) {
  e.preventDefault();

  const email = document.querySelector('input[type="email"]').value;
  const password = document.querySelector('input[type="password"]').value;
  const role = document.querySelector('select').value.toLowerCase();

  const res = await fetch("http://localhost:5000/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password, role })
  });

  const data = await res.json();

  if (res.ok) {
    localStorage.setItem("idToken", data.idToken);
    localStorage.setItem("role", data.role);
    localStorage.setItem("userName", data.name);

    const role = data.role;
    if (role === "student") {
      window.location.href = "StudHome.html";
    } else if (role === "mentor") {
      window.location.href = "mentorPage.html";
    } else {
      alert("Admin dashboard coming soon!");
    }
  } else {
    alert("Error: " + data.error);
  }
}

async function handleGoogleLogin() {
  const role = document.querySelector('select').value.toLowerCase();

  try {
    const result = await auth.signInWithPopup(provider);
    const idToken = await result.user.getIdToken();

    const res = await fetch("http://localhost:5000/google-login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ idToken, role })
    });

    const data = await res.json();

    if (res.ok) {
      localStorage.setItem("idToken", idToken);
      alert("Google login successful!");
      // window.location.href = "/dashboard";
    } else {
      alert("Error: " + data.error);
    }
  } catch (err) {
    alert("Google login failed: " + err.message);
  }
}

function togglePassword() {
  const input = document.getElementById("passwordInput");
  const icon = document.getElementById("eyeIcon");
  if (input.type === "password") {
    input.type = "text";
    icon.textContent = "visibility_off";
  } else {
    input.type = "password";
    icon.textContent = "visibility";
  }
}
</script>
