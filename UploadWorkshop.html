<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Post Opportunities | Edu Navigator</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0040a1",
                        "primary-container": "#0056d2",
                        "on-primary": "#ffffff",
                        "surface": "#f8f9fa",
                        "surface-container-low": "#f3f4f5",
                        "surface-container-lowest": "#ffffff",
                        "on-surface": "#191c1d",
                        "on-surface-variant": "#424654",
                        "outline-variant": "#c3c6d6",
                        "secondary-container": "#a0f399"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Plus Jakarta Sans"]
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .font-headline { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .type-btn.active { border-color: #0040a1; background-color: rgba(0, 64, 161, 0.05); }
    </style>
</head>

<body class="bg-surface-container-low text-on-surface min-h-screen">

<!-- Sidebar (Synced with organizer.html) -->
<aside class="fixed left-0 top-0 h-full flex flex-col p-6 gap-y-2 bg-slate-50 w-72 z-50 border-r border-slate-200 hidden lg:flex">
  <div class="mb-10 px-4">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-xl bg-primary flex items-center justify-center text-white">
        <span class="material-symbols-outlined" style='font-variation-settings: "FILL" 1;'>school</span>
      </div>
      <div>
        <h1 class="font-headline font-bold text-primary text-xl tracking-tighter uppercase">EDU NAVIGATOR</h1>
        <p class="text-[0.65rem] uppercase tracking-widest text-slate-500 font-bold leading-tight">Organizer Dashboard</p>
      </div>
    </div>
  </div>
  
  <nav class="flex-1 space-y-1">
    <a href="organizer.html" class="flex items-center gap-3 text-slate-500 px-4 py-3 hover:bg-slate-100/50 hover:text-primary rounded-xl transition-all">
      <span class="material-symbols-outlined">dashboard</span>
      <span class="text-sm">Home</span>
    </a>
    <a href="#" class="flex items-center gap-3 text-slate-500 px-4 py-3 hover:bg-slate-100/50 hover:text-primary rounded-xl transition-all">
      <span class="material-symbols-outlined">person_outline</span>
      <span class="text-sm">Profile</span>
    </a>
    <a href="UploadWorkshop.html" class="flex items-center gap-3 bg-white text-primary shadow-sm px-4 py-3 rounded-xl font-bold transition-all">
      <span class="material-symbols-outlined">upload</span>
      <span class="text-sm">Post Opportunities</span>
    </a>
    <a href="#" class="flex items-center gap-3 text-slate-500 px-4 py-3 hover:bg-slate-100/50 hover:text-primary rounded-xl transition-all">
      <span class="material-symbols-outlined">library_books</span>
      <span class="text-sm">Resources</span>
    </a>
  </nav>

  <div class="mt-auto px-4">
    <button onclick="localStorage.removeItem('idToken'); window.location.href='login.html'" class="flex items-center gap-3 text-slate-500 hover:text-error transition-colors w-full px-4 py-3">
        <span class="material-symbols-outlined">logout</span>
        <span class="text-sm font-bold">Logout</span>
    </button>
  </div>
</aside>

<!-- Main Content -->
<main class="lg:ml-72 min-h-screen">
  <header class="sticky top-0 w-full flex items-center justify-between px-6 lg:px-10 py-3 h-16 bg-white/80 backdrop-blur-md z-40 shadow-sm border-b border-slate-100">
    <div class="flex items-center gap-4 flex-1">
      <div class="lg:hidden font-headline font-extrabold text-primary text-lg">Edu Navigator</div>
      <h2 class="hidden lg:block font-headline font-extrabold text-primary text-lg">Post Opportunities</h2>
    </div>
    <div class="flex items-center gap-4">
      <div class="w-8 h-8 rounded-full bg-primary-container overflow-hidden ring-2 ring-white shadow-sm cursor-pointer ml-2">
        <img id="profilePhoto" src="" alt="Profile" class="w-full h-full object-cover" />
      </div>
    </div>
  </header>

  <div class="p-6 lg:p-10 max-w-4xl mx-auto space-y-10">
    <section class="bg-surface-container-lowest p-8 rounded-3xl shadow-sm border border-outline-variant/10">
      <div class="mb-8">
        <h3 class="text-2xl font-headline font-extrabold text-on-surface tracking-tight mb-2">Create New Post</h3>
        <p class="text-on-surface-variant text-sm">Fill in the details below to publish your student opportunity.</p>
      </div>

      <!-- Type Selector -->
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
        <button onclick="setType('workshop')" id="btn-workshop" class="type-btn active flex flex-col items-center gap-2 p-5 rounded-2xl border-2 border-outline-variant hover:border-primary transition-all group">
          <span class="material-symbols-outlined text-primary scale-110">groups</span>
          <span class="text-xs font-bold uppercase tracking-wider">Workshop</span>
        </button>
        <button onclick="setType('internship')" id="btn-internship" class="type-btn flex flex-col items-center gap-2 p-5 rounded-2xl border-2 border-outline-variant hover:border-primary transition-all group">
          <span class="material-symbols-outlined text-primary scale-110">work</span>
          <span class="text-xs font-bold uppercase tracking-wider">Internship</span>
        </button>
        <button onclick="setType('scholarship')" id="btn-scholarship" class="type-btn flex flex-col items-center gap-2 p-5 rounded-2xl border-2 border-outline-variant hover:border-primary transition-all group">
          <span class="material-symbols-outlined text-primary scale-110">school</span>
          <span class="text-xs font-bold uppercase tracking-wider">Scholarship</span>
        </button>
        <button onclick="setType('hackathon')" id="btn-hackathon" class="type-btn flex flex-col items-center gap-2 p-5 rounded-2xl border-2 border-outline-variant hover:border-primary transition-all group">
          <span class="material-symbols-outlined text-primary scale-110">code</span>
          <span class="text-xs font-bold uppercase tracking-wider">Hackathon</span>
        </button>
      </div>

      <!-- Form -->
      <form id="postForm" onsubmit="event.preventDefault(); createPost();" class="space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="space-y-2 md:col-span-2">
            <label class="text-[11px] font-bold text-on-surface-variant uppercase tracking-widest ml-1">Opportunity Title</label>
            <input id="postTitle" required class="w-full bg-surface-container-high border-none rounded-xl p-4 text-sm focus:ring-2 focus:ring-primary transition-all" placeholder="e.g. Advanced Machine Learning Workshop"/>
          </div>
          <div class="space-y-2">
            <label class="text-[11px] font-bold text-on-surface-variant uppercase tracking-widest ml-1">Deadline / Date</label>
            <input id="postDeadline" required class="w-full bg-surface-container-high border-none rounded-xl p-4 text-sm focus:ring-2 focus:ring-primary" type="date"/>
          </div>
          <div class="space-y-2">
            <label class="text-[11px] font-bold text-on-surface-variant uppercase tracking-widest ml-1">Location / Venue</label>
            <input id="postLocation" required class="w-full bg-surface-container-high border-none rounded-xl p-4 text-sm focus:ring-2 focus:ring-primary" placeholder="Remote / City" type="text"/>
          </div>
        </div>

        <div class="space-y-2">
          <label class="text-[11px] font-bold text-on-surface-variant uppercase tracking-widest ml-1">Detailed Description</label>
          <textarea id="postDescription" required class="w-full bg-surface-container-high border-none rounded-xl p-4 text-sm focus:ring-2 focus:ring-primary h-32" placeholder="Explain the benefits, eligibility, and process..."></textarea>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-2">
              <label class="text-[11px] font-bold text-on-surface-variant uppercase tracking-widest ml-1">Registration Link (URL)</label>
              <input id="postLink" required class="w-full bg-surface-container-high border-none rounded-xl p-4 text-sm focus:ring-2 focus:ring-primary" placeholder="https://..." type="url"/>
            </div>
            <div class="space-y-2">
                <label class="text-[11px] font-bold text-on-surface-variant uppercase tracking-widest ml-1">Funding / Stipend (Optional)</label>
                <input id="postFunding" class="w-full bg-surface-container-high border-none rounded-xl p-4 text-sm focus:ring-2 focus:ring-primary" placeholder="e.g. $500 / month" type="text"/>
            </div>
        </div>

        <div class="flex justify-end pt-4">
          <button class="bg-primary text-white px-10 py-4 rounded-xl font-bold text-sm shadow-xl shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all flex items-center gap-3">
            <span class="material-symbols-outlined text-sm">publish</span>
            Publish Opportunity
          </button>
        </div>
      </form>
    </section>
  </div>
</main>

<script>
const idToken = localStorage.getItem("idToken");
if (!idToken) window.location.href = "login.html";

let selectedType = "workshop";

function setType(type) {
  selectedType = type;
  document.querySelectorAll(".type-btn").forEach(btn => btn.classList.remove("active"));
  document.getElementById("btn-" + type).classList.add("active");
}

async function createPost() {
  const title = document.getElementById("postTitle").value;
  const description = document.getElementById("postDescription").value;
  const deadline = document.getElementById("postDeadline").value;
  const location = document.getElementById("postLocation").value;
  const funding = document.getElementById("postFunding").value;
  const link = document.getElementById("postLink").value;

  const res = await fetch("http://localhost:5000/posts", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": idToken
    },
    body: JSON.stringify({ title, description, type: selectedType, deadline, location, funding, link })
  });

  if (res.ok) {
    alert("Opportunity published successfully!");
    window.location.href = "organizer.html"; // Redirect to dashboard to see the post
  } else {
    const data = await res.json();
    alert("Error: " + data.error);
  }
}

async function loadProfilePicture() {
    try {
        const res = await fetch("http://localhost:5000/profile", {
            headers: { "Authorization": idToken }
        });
        const data = await res.json();
        if (res.ok && data.photo) {
            document.getElementById("profilePhoto").src = data.photo;
        }
    } catch (error) { console.error("Error loading profile:", error); }
}

loadProfilePicture();
</script>
</body>
</html>
