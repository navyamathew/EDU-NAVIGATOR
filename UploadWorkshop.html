<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Workshop Management - Edu Navigator</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-bright": "#f8f9fa",
              "primary-container": "#0056d2",
              "on-surface-variant": "#424654",
              "on-tertiary-fixed": "#001f24",
              "on-primary-fixed-variant": "#0040a1",
              "on-secondary-fixed-variant": "#005312",
              "primary": "#0040a1",
              "on-surface": "#191c1d",
              "surface-variant": "#e1e3e4",
              "on-primary-fixed": "#001847",
              "surface-container-highest": "#e1e3e4",
              "on-tertiary-fixed-variant": "#004e59",
              "on-secondary": "#ffffff",
              "inverse-surface": "#2e3132",
              "outline": "#737785",
              "surface-container-lowest": "#ffffff",
              "tertiary-container": "#006976",
              "on-error": "#ffffff",
              "secondary-fixed": "#a3f69c",
              "primary-fixed": "#dae2ff",
              "tertiary": "#004f5a",
              "secondary-container": "#a0f399",
              "error-container": "#ffdad6",
              "surface-dim": "#d9dadb",
              "surface-container-high": "#e7e8e9",
              "surface-container": "#edeeef",
              "secondary-fixed-dim": "#88d982",
              "tertiary-fixed": "#9eefff",
              "outline-variant": "#c3c6d6",
              "on-primary": "#ffffff",
              "on-background": "#191c1d",
              "background": "#f8f9fa",
              "surface": "#f8f9fa",
              "on-error-container": "#93000a",
              "surface-tint": "#0056d2",
              "secondary": "#1b6d24",
              "on-primary-container": "#ccd8ff",
              "inverse-primary": "#b2c5ff",
              "tertiary-fixed-dim": "#55d7ed",
              "surface-container-low": "#f3f4f5",
              "on-secondary-fixed": "#002204",
              "error": "#ba1a1a",
              "primary-fixed-dim": "#b2c5ff",
              "on-tertiary-container": "#74eaff",
              "on-tertiary": "#ffffff",
              "on-secondary-container": "#217128",
              "inverse-on-surface": "#f0f1f2"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Plus Jakarta Sans"],
              "label": ["Plus Jakarta Sans"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        h1, h2, h3 { font-family: 'Manrope', sans-serif; }
    </style>
</head>
<body class="bg-surface-container-low text-on-surface flex min-h-screen">

<!-- Sidebar -->
<aside class="fixed left-0 top-0 h-full flex flex-col p-6 gap-y-2 bg-slate-50 w-72 z-50">
  <div class="mb-10 px-4">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-xl bg-primary-container flex items-center justify-center text-on-primary">
        <span class="material-symbols-outlined" style='font-variation-settings: "FILL" 1;'>school</span>
      </div>
      <div>
        <h1 class="font-['Manrope'] font-bold text-blue-900 text-xl tracking-tighter">EDU NAVIGATOR</h1>
        <p class="text-[0.65rem] uppercase tracking-widest text-slate-500 font-bold">Organizer Dashboard</p>
      </div>
    </div>
  </div>
  <nav class="flex-1 
  space-y-1">
    <a href="mentorPage.html" class="flex items-center gap-3 text-slate-500 px-4 py-3 hover:bg-slate-100/50 hover:text-blue-700 rounded-xl transition-all">
      <span class="material-symbols-outlined">dashboard</span>
      <span class="text-sm">Home</span>
    </a>
    <a href="#" class="flex items-center gap-3 text-slate-500 px-4 py-3 hover:bg-slate-100/50 hover:text-blue-700 rounded-xl transition-all">
      <span class="material-symbols-outlined">person_outline</span>
      <span class="text-sm">Profile</span>
    </a>
    <a href="UploadWorkshop.html" class="flex items-center gap-3 bg-white text-blue-800 shadow-sm rounded-xl font-bold px-4 py-3 transition-all">
      <span class="material-symbols-outlined">upload</span>
      <span class="text-sm">Post Opportunities</span>
    </a>
    <a href="mentorResource.html" class="flex items-center gap-3 text-slate-500 px-4 py-3 hover:bg-slate-100/50 hover:text-blue-700 rounded-xl transition-all">
      <span class="material-symbols-outlined">library_books</span>
      <span class="text-sm">Resources</span>
    </a>
  </nav>
</aside>

<!-- Main Content -->
<main class="flex-1 ml-72">

  <!-- Header -->
  <header class="flex items-center justify-between px-8 h-16 bg-slate-50/80 backdrop-blur-xl sticky top-0 shadow-sm z-40">
    <h2 class="font-['Manrope'] font-extrabold tracking-tighter text-blue-900 text-lg">Post Opportunities</h2>
    <div class="flex items-center gap-4">
      <button class="text-slate-500 hover:text-blue-700">
        <span class="material-symbols-outlined">notifications</span>
      </button>

    </div>
  </header>

  <div class="p-10 max-w-6xl mx-auto space-y-10">

    <!-- Create New Post -->
    <section class="bg-surface-container-lowest p-8 rounded-xl shadow-sm">
      <h3 class="text-xl font-bold mb-6">Create New Post</h3>

      <!-- Type Selector -->
      <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-8">
        <button onclick="setType('workshop')" id="btn-workshop" class="type-btn flex flex-col items-center gap-2 p-4 rounded-xl border-2 border-outline-variant hover:border-primary transition-all">
          <span class="material-symbols-outlined text-primary">groups</span>
          <span class="text-xs font-bold">Workshop</span>
        </button>
        <button onclick="setType('internship')" id="btn-internship" class="type-btn flex flex-col items-center gap-2 p-4 rounded-xl border-2 border-outline-variant hover:border-primary transition-all">
          <span class="material-symbols-outlined text-primary">work</span>
          <span class="text-xs font-bold">Internship</span>
        </button>
        <button onclick="setType('scholarship')" id="btn-scholarship" class="type-btn flex flex-col items-center gap-2 p-4 rounded-xl border-2 border-outline-variant hover:border-primary transition-all">
          <span class="material-symbols-outlined text-primary">school</span>
          <span class="text-xs font-bold">Scholarship</span>
        </button>
        <button onclick="setType('hackathon')" id="btn-hackathon" class="type-btn flex flex-col items-center gap-2 p-4 rounded-xl border-2 border-outline-variant hover:border-primary transition-all">
          <span class="material-symbols-outlined text-primary">code</span>
          <span class="text-xs font-bold">Hackathon</span>
        </button>
      </div>

      <!-- Form -->
      <div class="space-y-4">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="space-y-1">
            <label class="text-xs font-bold text-on-surface-variant uppercase">Title</label>
            <input id="postTitle" class="w-full bg-surface-container-high border-none rounded-lg p-3 text-sm focus:ring-2 focus:ring-primary" type="text" placeholder="e.g. Introduction to Neural Networks"/>
          </div>
          <div class="space-y-1">
            <label class="text-xs font-bold text-on-surface-variant uppercase">Deadline / Date</label>
            <input id="postDeadline" class="w-full bg-surface-container-high border-none rounded-lg p-3 text-sm focus:ring-2 focus:ring-primary" type="date"/>
          </div>
        </div>

        <div class="space-y-1">
          <label class="text-xs font-bold text-on-surface-variant uppercase">Description</label>
          <textarea id="postDescription" class="w-full bg-surface-container-high border-none rounded-lg p-3 text-sm focus:ring-2 focus:ring-primary h-24" placeholder="Describe this opportunity..."></textarea>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="space-y-1">
            <label class="text-xs font-bold text-on-surface-variant uppercase">Location / College</label>
            <input id="postLocation" class="w-full bg-surface-container-high border-none rounded-lg p-3 text-sm focus:ring-2 focus:ring-primary" type="text" placeholder="e.g. Stanford University"/>
          </div>
          <div class="space-y-1">
            <label class="text-xs font-bold text-on-surface-variant uppercase">Funding / Prize (optional)</label>
            <input id="postFunding" class="w-full bg-surface-container-high border-none rounded-lg p-3 text-sm focus:ring-2 focus:ring-primary" type="text" placeholder="e.g. $10,000"/>
          </div>
        </div>

        <div class="space-y-1">
          <label class="text-xs font-bold text-on-surface-variant uppercase">Registration Link</label>
          <input id="postLink" class="w-full bg-surface-container-high border-none rounded-lg p-3 text-sm focus:ring-2 focus:ring-primary font-mono" type="url" placeholder="https://..."/>
        </div>

        <div class="flex justify-end pt-2">
          <button onclick="createPost()" class="px-8 py-3 bg-primary text-white font-bold rounded-xl hover:opacity-90 transition-opacity">
            Post Now
          </button>
        </div>
      </div>
    </section>

    <!-- My Posts -->
    <section class="bg-surface-container-lowest p-8 rounded-xl shadow-sm">
      <div class="flex justify-between items-center mb-6">
        <h3 class="text-xl font-bold">My Posts</h3>
        <span id="postCount" class="bg-secondary-container text-on-secondary-container px-3 py-1 rounded-full text-xs font-bold">0 ACTIVE</span>
      </div>
      <div id="postsList" class="space-y-4">
        <p class="text-on-surface-variant text-sm text-center py-8">No posts yet. Create your first one above!</p>
      </div>
    </section>

  </div>
</main>

<!-- Edit Modal -->
<div id="editModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center">
  <div class="bg-white rounded-2xl p-8 max-w-lg w-full mx-4 shadow-xl space-y-4">
    <h3 class="text-xl font-bold">Edit Post</h3>
    <input id="editId" type="hidden"/>
    <div class="space-y-1">
      <label class="text-xs font-bold text-on-surface-variant uppercase">Title</label>
      <input id="editTitle" class="w-full bg-surface-container-high border-none rounded-lg p-3 text-sm" type="text"/>
    </div>
    <div class="space-y-1">
      <label class="text-xs font-bold text-on-surface-variant uppercase">Description</label>
      <textarea id="editDescription" class="w-full bg-surface-container-high border-none rounded-lg p-3 text-sm h-24"></textarea>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div class="space-y-1">
        <label class="text-xs font-bold text-on-surface-variant uppercase">Location</label>
        <input id="editLocation" class="w-full bg-surface-container-high border-none rounded-lg p-3 text-sm" type="text"/>
      </div>
      <div class="space-y-1">
        <label class="text-xs font-bold text-on-surface-variant uppercase">Funding</label>
        <input id="editFunding" class="w-full bg-surface-container-high border-none rounded-lg p-3 text-sm" type="text"/>
      </div>
    </div>
    <div class="space-y-1">
      <label class="text-xs font-bold text-on-surface-variant uppercase">Deadline</label>
      <input id="editDeadline" class="w-full bg-surface-container-high border-none rounded-lg p-3 text-sm" type="date"/>
    </div>
    <div class="space-y-1">
      <label class="text-xs font-bold text-on-surface-variant uppercase">Link</label>
      <input id="editLink" class="w-full bg-surface-container-high border-none rounded-lg p-3 text-sm font-mono" type="url"/>
    </div>
    <div class="flex gap-3 pt-2">
      <button onclick="closeEditModal()" class="flex-1 py-3 rounded-xl border border-outline-variant font-bold text-sm">Cancel</button>
      <button onclick="saveEdit()" class="flex-1 py-3 rounded-xl bg-primary text-white font-bold text-sm">Save Changes</button>
    </div>
  </div>
</div>

<script>
const idToken = localStorage.getItem("idToken");
if (!idToken) window.location.href = "login.html";

let selectedType = "workshop";

function setType(type) {
  selectedType = type;
  document.querySelectorAll(".type-btn").forEach(btn => {
    btn.classList.remove("border-primary", "bg-primary/5");
    btn.classList.add("border-outline-variant");
  });
  const active = document.getElementById("btn-" + type);
  active.classList.add("border-primary", "bg-primary/5");
  active.classList.remove("border-outline-variant");
}

// Set default active type
setType("workshop");

async function createPost() {
  const title = document.getElementById("postTitle").value;
  const description = document.getElementById("postDescription").value;
  const deadline = document.getElementById("postDeadline").value;
  const location = document.getElementById("postLocation").value;
  const funding = document.getElementById("postFunding").value;
  const link = document.getElementById("postLink").value;

  if (!title || !description) {
    alert("Title and description are required!");
    return;
  }

  const res = await fetch("http://localhost:5000/posts", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": idToken
    },
    body: JSON.stringify({
      title, description, type: selectedType,
      deadline, location, funding, link
    })
  });

  const data = await res.json();
  if (res.ok) {
    alert("Post created successfully!");
    // Clear form
    document.getElementById("postTitle").value = "";
    document.getElementById("postDescription").value = "";
    document.getElementById("postDeadline").value = "";
    document.getElementById("postLocation").value = "";
    document.getElementById("postFunding").value = "";
    document.getElementById("postLink").value = "";
    loadMyPosts();
  } else {
    alert("Error: " + data.error);
  }
}

async function loadMyPosts() {
  const res = await fetch("http://localhost:5000/posts/my/all", {
    headers: { "Authorization": idToken }
  });
  const posts = await res.json();

  const container = document.getElementById("postsList");
  document.getElementById("postCount").textContent = posts.length + " ACTIVE";

  if (posts.length === 0) {
    container.innerHTML = '<p class="text-on-surface-variant text-sm text-center py-8">No posts yet. Create your first one above!</p>';
    return;
  }

  container.innerHTML = posts.map(post => `
    <div class="flex items-center gap-6 p-4 rounded-xl hover:bg-surface-container transition-all border border-transparent hover:border-outline-variant/30">
      <div class="w-14 h-14 rounded-lg bg-surface-container-high flex items-center justify-center">
        <span class="material-symbols-outlined text-primary">${getIcon(post.type)}</span>
      </div>
      <div class="flex-1">
        <div class="flex items-center gap-2 mb-1">
          <h4 class="font-bold text-lg">${post.title}</h4>
          <span class="text-[10px] font-bold uppercase px-2 py-0.5 rounded-full bg-primary/10 text-primary">${post.type}</span>
        </div>
        <p class="text-sm text-on-surface-variant">${post.description.substring(0, 80)}...</p>
        <div class="flex gap-4 mt-1 text-xs text-on-surface-variant">
          ${post.deadline ? `<span>📅 ${post.deadline}</span>` : ""}
          ${post.location ? `<span>📍 ${post.location}</span>` : ""}
          ${post.funding ? `<span>💰 ${post.funding}</span>` : ""}
        </div>
      </div>
      <div class="flex items-center gap-3">
        <button onclick="openEditModal('${post.id}', '${post.title}', \`${post.description}\`, '${post.location}', '${post.funding}', '${post.deadline}', '${post.link}')" 
          class="flex items-center gap-2 px-4 py-2 bg-primary/10 text-primary font-bold rounded-lg hover:bg-primary hover:text-white transition-all">
          <span class="material-symbols-outlined text-sm">edit</span>
          Edit
        </button>
        <button onclick="deletePost('${post.id}')" class="p-2 text-on-surface-variant hover:text-error transition-colors">
          <span class="material-symbols-outlined">delete</span>
        </button>
      </div>
    </div>
  `).join("");
}

function getIcon(type) {
  const icons = { workshop: "groups", internship: "work", scholarship: "school", hackathon: "code" };
  return icons[type] || "article";
}

function openEditModal(id, title, description, location, funding, deadline, link) {
  document.getElementById("editId").value = id;
  document.getElementById("editTitle").value = title;
  document.getElementById("editDescription").value = description;
  document.getElementById("editLocation").value = location || "";
  document.getElementById("editFunding").value = funding || "";
  document.getElementById("editDeadline").value = deadline || "";
  document.getElementById("editLink").value = link || "";
  document.getElementById("editModal").classList.remove("hidden");
}

function closeEditModal() {
  document.getElementById("editModal").classList.add("hidden");
}

async function saveEdit() {
  const id = document.getElementById("editId").value;
  const res = await fetch(`http://localhost:5000/posts/${id}`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "Authorization": idToken
    },
    body: JSON.stringify({
      title: document.getElementById("editTitle").value,
      description: document.getElementById("editDescription").value,
      location: document.getElementById("editLocation").value,
      funding: document.getElementById("editFunding").value,
      deadline: document.getElementById("editDeadline").value,
      link: document.getElementById("editLink").value
    })
  });

  const data = await res.json();
  if (res.ok) {
    closeEditModal();
    alert("Post updated!");
    loadMyPosts();
  } else {
    alert("Error: " + data.error);
  }
}

async function deletePost(id) {
  if (!confirm("Are you sure you want to delete this post?")) return;

  const res = await fetch(`http://localhost:5000/posts/${id}`, {
    method: "DELETE",
    headers: { "Authorization": idToken }
  });

  const data = await res.json();
  if (res.ok) {
    alert("Post deleted!");
    loadMyPosts();
  } else {
    alert("Error: " + data.error);
  }
}

loadMyPosts();
</script>
</body></html>
