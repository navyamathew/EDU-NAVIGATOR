<script>
async function handleRegister(e) {
  e.preventDefault();

  const name = document.getElementById("full-name").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const role = document.getElementById("role").value;

  if (!role) {
    alert("Please select a role!");
    return;
  }

  const res = await fetch("http://localhost:5000/register", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name, email, password, role })
  });

  const data = await res.json();

  if (res.ok) {
    localStorage.setItem("idToken", data.idToken);
    alert("Account created successfully!");
    window.location.href = "login.html";
  } else {
    alert("Error: " + data.error);
  }
}

function togglePassword() {
  const input = document.getElementById("password");
  const icon = document.getElementById("eyeIcon");
  if (input.type === "password") {
    input.type = "text";
    icon.textContent = "visibility_off";
  } else {
    input.type = "password";
    icon.textContent = "visibility";
  }
}
</script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyB-7PjG5gfg1f4FyKSKMeKsMIjiRUAPsx0",
  authDomain: "mini-project-c7982.firebaseapp.com",
  projectId: "mini-project-c7982"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const provider = new firebase.auth.GoogleAuthProvider();

async function handleGoogleRegister() {
  const role = document.getElementById("role").value;

  if (!role) {
    alert("Please select a role before continuing with Google!");
    return;
  }

  try {
    const result = await auth.signInWithPopup(provider);
    const idToken = await result.user.getIdToken();

    const res = await fetch("http://localhost:5000/google-login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ idToken, role })
    });

    const data = await res.json();

    if (res.ok) {
      localStorage.setItem("idToken", idToken);
      alert("Account created successfully!");
      window.location.href = "login.html";
    } else {
      alert("Error: " + data.error);
    }
  } catch (err) {
    alert("Google sign up failed: " + err.message);
  }
}
</script>
